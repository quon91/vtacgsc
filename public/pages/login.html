<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — VTAC GSC</title>
<link rel="stylesheet" href="/css/main.css">
<style>
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at top, rgba(200,169,81,.06) 0%, transparent 60%), var(--bg); }
.auth-box  { background: var(--card); border: 1px solid var(--border2); border-radius: 18px; padding: 40px; width: 100%; max-width: 420px; }
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-emblem { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),var(--amber)); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: #000; margin: 0 auto 10px; box-shadow: 0 0 24px rgba(200,169,81,.3); }
.auth-org  { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); }
.auth-name { font-size: 18px; font-weight: 900; color: var(--text); }
.auth-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.auth-sub   { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text2); }
.pw-wrap { position: relative; }
.pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box fade-in">
    <div class="auth-logo">
      <div class="auth-emblem">GSC</div>
      <div class="auth-org">Virtual</div>
      <div class="auth-name">Global Strike Command</div>
    </div>

    <div id="denied-alert" class="alert alert-error" style="display:none">Your account application was denied. Contact command staff for more information.</div>

    <div class="auth-title">Pilot Login</div>
    <div class="auth-sub">Enter your credentials to access the command portal.</div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="pilot@vtacgsc.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw()">👁</button>
        </div>
      </div>
      <div id="login-error" class="alert alert-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px" id="login-btn">
        Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:14px">
      <a href="/pages/forgot-password.html" style="font-size:13px;color:var(--text2)">Forgot password?</a>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/pages/register.html">Apply to Join</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script>
// Show denied message if redirected from auth check
if (new URLSearchParams(location.search).get('denied')) {
  document.getElementById('denied-alert').style.display = 'block';
}

// If already logged in, redirect
function onAuthReady(user, pilot) {
  if (!user) return;
  if (pilot?.status === 'active') {
    if (isMasterAdminPilot(pilot)) { window.location.href = '/pages/master-admin.html'; return; }
    window.location.href = '/pages/dashboard.html';
  } else if (pilot?.status === 'pending') {
    window.location.href = '/pages/pending.html';
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.textContent = 'Signing in…'; btn.disabled = true;

  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    const doc  = await db.collection('pilots').doc(cred.user.uid).get();
    if (!doc.exists) throw new Error('Pilot record not found. Contact admin.');
    const pilot = doc.data();
    if (pilot.status === 'denied') {
      await auth.signOut();
      errEl.textContent = 'Your application was denied. Contact command staff.';
      errEl.style.display = 'block';
      return;
    }
    if (pilot.status === 'pending') { window.location.href = '/pages/pending.html'; return; }
    // Log last login
    await db.collection('pilots').doc(cred.user.uid).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
    if (isMasterAdminPilot(pilot)) { window.location.href = '/pages/master-admin.html'; return; }
    window.location.href = '/pages/dashboard.html';
  } catch(err) {
    const msgs = { 'auth/user-not-found':'No account found with that email.', 'auth/wrong-password':'Incorrect password.', 'auth/too-many-requests':'Too many attempts. Please wait before trying again.', 'auth/invalid-email':'Invalid email address.' };
    errEl.textContent = msgs[err.code] || err.message;
    errEl.style.display = 'block';
  } finally {
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}

function togglePw() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
